DWAPlannerROS:

# Robot Configuration Parameters
  max_vel_x: 0.6  # 0.55
  min_vel_x: -0.6

  max_vel_y: 0.6  # omni drive robot
  min_vel_y: -0.6  # omni drive robot

  holonomic_robot: true   # 全向模式：允许横向移动，保持yaw不变

  max_vel_trans: 0.6
  min_vel_trans: 0.01
  trans_stopped_vel: 0.01

  max_vel_theta: 0.6  # choose slightly less than the base's capability
  min_vel_theta: 0.0  # this is the min angular velocity when there is negligible translational velocity
  theta_stopped_vel: 0.01

  acc_lim_x: 0.4
  acc_lim_theta: 1.0
  acc_lim_y: 0.4
  acc_lim_trans: 0.4

# Goal Tolerance Parameters
  yaw_goal_tolerance: 0.03
  xy_goal_tolerance: 0.03

# Forward Simulation Parameters
  sim_time: 1.5
  sim_granularity: 0.025
  angular_sim_granularity: 0.1
  vx_samples: 6
  vy_samples: 10
  vtheta_samples: 20

# Trajectory Scoring Parameters
  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.01

  forward_point_distance: 0.4
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  twirling_scale: 0.0

# Oscillation Prevention Parameters
  oscillation_reset_dist: 0.05
  oscillation_reset_angle: 0.2

# Debugging
  publish_traj_pc : fasle
  publish_cost_grid_pc: fasle
  global_frame_id: odom
